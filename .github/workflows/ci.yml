name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs so repeated pushes to a branch don't pile up.
# Scoped to pull_request only: push-to-main runs are left to finish so an
# intermediate main commit never records a cancelled (non-success) check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: every job only reads the repo — none push, comment, or
# publish, so the GITHUB_TOKEN needs no write scopes. The `changes` job widens
# this to `pull-requests: read` at the job level (dorny/paths-filter reads the
# PR file list via the API); nothing else needs more than this.
permissions:
  contents: read

# WHAT each job does lives in the Justfile (the fmt-check / ci-backend
# recipes); these jobs only handle Actions-specific concerns — checkout,
# toolchain/tool setup, and caching — then call the matching recipe. `just ci`
# chains the same recipes locally; keep them in sync by editing the Justfile,
# not by re-describing the commands here.
jobs:
  # Path filter — future scaffolding. Nothing consumes the `code` output yet:
  # every current job is fast enough to run unconditionally. When slow jobs
  # land (frontend build, e2e), gate them on this output the kammerz way
  # (`if: always() && (github.event_name == 'push' || needs.changes.outputs.code == 'true')`)
  # so docs-/beads-only PRs skip them while the skip-aware all-checks
  # aggregator keeps such PRs mergeable. The dorny step runs ONLY on
  # pull_request (reads the PR's changed-file list via the API); on push it is
  # skipped entirely — no git-diff against github.event.before, which avoids
  # dorny's force-push / first-push / shallow-checkout failure modes.
  changes:
    name: detect code changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout (unused on PR; harmless on push)
      pull-requests: read # dorny reads the PR's changed-file list via the API
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        with:
          # `code = true` when ANY changed file matches — real source, build
          # inputs, or the CI definition itself. Everything NOT listed here
          # (notably .beads/** export noise and docs) is non-triggering.
          filters: |
            code:
              - 'healthie-shared/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'Justfile'
              - '.github/workflows/ci.yml'

  # Format gate → `just fmt-check`: dprint (Markdown/JSON/TOML/YAML per
  # dprint.jsonc) + rustfmt (Rust). Nightly toolchain because rustfmt.toml
  # uses nightly-only options (imports_granularity, format_strings). Fix
  # locally with `just fmt`.
  format:
    name: format (dprint + rustfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just,dprint
      - run: just fmt-check

  # Backend gate → `just ci-backend`: cargo build + test + clippy
  # (-D warnings -D clippy::pedantic), --workspace --locked.
  backend:
    name: backend (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just ci-backend

  # The eventual deploy target is aarch64 Linux; without this gate, a
  # dependency that breaks on aarch64 surfaces at deploy time instead of in
  # review. `cargo check` (not a full build) compiles every dependency and
  # this workspace for the target — which is what catches a target-specific
  # dep/compile break — without the heavier codegen + link. The aarch64 gcc
  # cross-linker is still required: ring / libsqlite3-sys compile target C via
  # the cc crate during cargo check.
  aarch64-cross-check:
    name: aarch64 cross-compile check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64
      - name: Install aarch64 cross linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross cargo check (aarch64-unknown-linux-gnu)
        run: cargo check --workspace --locked --target aarch64-unknown-linux-gnu

  # Single required status for branch protection. `if: always()` so it runs
  # even when a dependency was deliberately skipped. It FAILS if any
  # dependency ended in `failure` or `cancelled`, and TREATS `skipped` AS
  # ACCEPTABLE — so a future conditionally-skipped job doesn't wedge the
  # merge, but a real failure still blocks it. Make THIS the only required
  # check in branch protection; the per-job names then become free to
  # rename/condition without touching the protection rule.
  all-checks:
    name: all-checks
    needs: [changes, format, backend, aarch64-cross-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify required jobs (skipped is OK)
        # RESULTS holds only trusted status enums (success/failure/skipped/
        # cancelled), but pass it via env rather than inlining the expression
        # into the shell to keep to the no-interpolation-in-run convention.
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Dependency results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job ended with result '$r'."
              exit 1
            fi
          done
          echo "All required jobs passed (or were acceptably skipped)."
